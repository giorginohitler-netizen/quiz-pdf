<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Studio Offline</title>
  <style>
    :root {
      --primary: #6366F1;
      --primary-hover: #4F46E5;
      --bg-gradient: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --success-bg: #d1fae5;
      --success-border: #10b981;
      --success-text: #065f46;
      --error-bg: #fee2e2;
      --error-border: #ef4444;
      --error-text: #991b1b;
    }
    
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: var(--bg-gradient); 
      padding: 20px 15px; 
      color: var(--text-main); 
      max-width: 600px; 
      margin: 0 auto; 
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    h1 { 
      text-align: center; 
      color: var(--primary); 
      font-size: 1.8rem;
      margin-bottom: 10px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    
    .card { 
      background: var(--card-bg); 
      border-radius: 20px; 
      padding: 25px 20px; 
      box-shadow: 0 10px 25px rgba(0,0,0,0.05), 0 4px 10px rgba(0,0,0,0.03); 
      margin-bottom: 25px; 
      backdrop-filter: blur(10px);
    }
    
    button { 
      background: var(--primary); 
      color: white; 
      border: none; 
      padding: 16px 24px; 
      border-radius: 14px; 
      font-size: 1.1rem; 
      font-weight: 600;
      cursor: pointer; 
      width: 100%; 
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
      margin-top: 15px; 
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }
    
    button:hover { 
      background: var(--primary-hover); 
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.4);
    }
    
    button:active {
      transform: translateY(0);
    }
    
    .hidden { display: none !important; }
    
    .progress-badge {
      display: inline-block;
      background: #e0e7ff;
      color: var(--primary);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .question-title { 
      font-size: 1.25rem; 
      font-weight: 700; 
      margin-bottom: 25px; 
      line-height: 1.4; 
      color: var(--text-main);
    }
    
    .option { 
      display: flex;
      align-items: center;
      padding: 16px 20px; 
      margin-bottom: 12px; 
      border: 2px solid #e5e7eb; 
      border-radius: 14px; 
      cursor: pointer; 
      background: #ffffff; 
      transition: all 0.2s ease; 
      font-size: 1.05rem;
      line-height: 1.3;
    }
    
    .option:hover { 
      border-color: #c7d2fe;
      background: #f8fafc; 
    }
    
    .option input[type="radio"] { 
      accent-color: var(--primary);
      width: 22px;
      height: 22px;
      margin-right: 15px; 
      flex-shrink: 0;
      cursor: pointer;
    }
    
    .correct { 
      background: var(--success-bg) !important; 
      border-color: var(--success-border) !important; 
      color: var(--success-text); 
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
    }
    
    .wrong { 
      background: var(--error-bg) !important; 
      border-color: var(--error-border) !important; 
      color: var(--error-text); 
    }
    
    .stats { 
      text-align: center; 
      font-size: 2rem; 
      font-weight: 800; 
      color: var(--primary); 
      margin: 20px 0 30px;
      padding: 20px;
      background: #f8fafc;
      border-radius: 16px;
      border: 2px dashed #cbd5e1;
    }
    
    .input-group { margin: 25px 0; text-align: center; }
    
    .input-group label {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
    }
    
    .input-group input { 
      padding: 12px 16px; 
      font-size: 1.2rem; 
      width: 140px; 
      text-align: center; 
      border: 2px solid #e5e7eb; 
      border-radius: 12px; 
      margin-top: 15px;
      transition: border-color 0.2s;
      outline: none;
    }
    
    .input-group input:focus {
      border-color: var(--primary);
    }
    
    .review-item { 
      margin-bottom: 20px; 
      padding: 20px; 
      background: #fff; 
      border: 2px solid #f1f5f9;
      border-left: 6px solid var(--error-border); 
      border-radius: 12px; 
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }
    
    .review-item strong { 
      color: var(--error-text); 
      display: block;
      font-size: 0.9rem;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    
    .review-question {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-main);
    }
    
    .review-correct { 
      color: var(--success-text); 
      font-weight: 600; 
      background: var(--success-bg);
      padding: 10px 14px;
      border-radius: 8px;
      display: block; 
      font-size: 1rem; 
      border: 1px solid var(--success-border);
    }
    
    .source-badge {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: right;
      margin-top: 20px;
      font-style: italic;
    }
  </style>
</head>

  function escapeHtml(unsafe) {
    if (!unsafe) return '';
    return unsafe
      .toString()
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  function initApp() {
    try {
      const statusEl = document.getElementById('db-status');
      const configEl = document.getElementById('quiz-config');

      if (QUESTIONS.length > 0) {
        statusEl.textContent = `Database caricato: ${QUESTIONS.length} domande incorporate.`;
        configEl.classList.remove('hidden');
      } else {
        statusEl.textContent = "Database vuoto. Usa il comando 'riaggiorna' in Antigravity per popolarlo.";
        configEl.classList.add('hidden');
      }
    } catch (e) {
      document.getElementById('db-status').textContent = "Errore interno: " + e.message;
    }
  }

  function shuffle(array) {
    let arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  document.getElementById('btn-start').addEventListener('click', () => {
    // Scopri le materie uniche (evitando vuoti o null)
    const subjects = [...new Set(QUESTIONS.map(q => q.subject).filter(s => s))];
    
    document.getElementById('start-screen').classList.add('hidden');
    
    if (subjects.length > 0) {
      document.getElementById('subject-screen').classList.remove('hidden');
      
      const container = document.getElementById('subject-buttons');
      let html = '';
      
      subjects.forEach(sub => {
        // Formatta la stringa per una visualizzazione pulita
        const label = sub.replace(/_/g, ' ');
        html += `<button class="subject-btn" data-subject="${sub}" style="text-transform: capitalize;">${label}</button>`;
      });
      html += `<button class="subject-btn" data-subject="ALL" style="background: #10B981;">Tutte le materie (Misto)</button>`;
      
      container.innerHTML = html;
      
      document.querySelectorAll('.subject-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const sc = e.target.getAttribute('data-subject');
          startSession(sc);
        });
      });
    } else {
      // Fallback in caso non ci siano materie definite nei JSON pre-esistenti
      startSession('ALL');
    }
  });

  function startSession(selectedSubject) {
    let filteredQuestions = QUESTIONS;
    if (selectedSubject !== 'ALL') {
      filteredQuestions = QUESTIONS.filter(q => q.subject === selectedSubject);
    }

    // Raggruppa le domande per topic
    const topicsMap = {};
    filteredQuestions.forEach(q => {
      const t = q.topic || 'Generale';
      if (!topicsMap[t]) topicsMap[t] = [];
      topicsMap[t].push(q);
    });

    let selectedQuestions = [];
    // Per ogni topic estrae casualmente 2-3 domande
    for (const t in topicsMap) {
      let tQs = shuffle(topicsMap[t]);
      const numToPick = Math.min(tQs.length, Math.floor(Math.random() * 2) + 2); // 2 o 3
      selectedQuestions = selectedQuestions.concat(tQs.slice(0, numToPick));
    }

    // Mescola l'ordine finale delle domande selezionate
    currentQuestions = shuffle(selectedQuestions);
    currentIndex = 0;
    score = 0;
    wrongAnswersReview = [];
    
    document.getElementById('subject-screen').classList.add('hidden');
    document.getElementById('quiz-screen').classList.remove('hidden');
    showQuestion();
  }

  function showQuestion() {
    if (currentIndex >= currentQuestions.length) return endQuiz();
    
    const q = currentQuestions[currentIndex];
    const container = document.getElementById('question-container');
    
    // Mescola opzioni a ogni ricaricamento
    let options = [
      { text: q.correct_answer, isCorrect: true },
      { text: q.wrong_answers[0], isCorrect: false },
      { text: q.wrong_answers[1], isCorrect: false },
      { text: q.wrong_answers[2], isCorrect: false }
    ];
    options = shuffle(options);

    let html = `<div class="progress-badge">Domanda ${currentIndex + 1} di ${currentQuestions.length}</div>
                <div class="question-title">${escapeHtml(q.question)}</div>`;
    
    options.forEach((opt, idx) => {
      if (opt.isCorrect) currentCorrectIndex = idx;
      html += `<label class="option" id="opt-${idx}">
                <input type="radio" name="q" value="${idx}">
                <span>${escapeHtml(opt.text)}</span>
               </label>`;
    });
    
    // Informazione tracciante sicura
    html += `<div class="source-badge">Fonte: ${escapeHtml(q.source_file || 'Sconosciuta')} <br> Argomento: ${escapeHtml(q.topic || '')}</div>`;

    container.innerHTML = html;
    document.getElementById('btn-next').textContent = "Conferma Risposta";
    document.getElementById('btn-next').onclick = checkAnswer;
  }

  function checkAnswer() {
    const selected = document.querySelector('input[name="q"]:checked');
    if (!selected) { alert("Seleziona una risposta!"); return; }

    const selectedIdx = parseInt(selected.value);
    document.querySelectorAll('input[name="q"]').forEach(r => r.disabled = true);

    if (selectedIdx === currentCorrectIndex) {
      document.getElementById(`opt-${selectedIdx}`).classList.add('correct');
      score++;
    } else {
      document.getElementById(`opt-${selectedIdx}`).classList.add('wrong');
      document.getElementById(`opt-${currentCorrectIndex}`).classList.add('correct');
      
      // Salvo la domanda sbagliata per il riepilogo
      const userSelectedText = document.querySelector(`#opt-${selectedIdx} span`).textContent;
      wrongAnswersReview.push({
        question: currentQuestions[currentIndex].question,
        correct_answer: currentQuestions[currentIndex].correct_answer,
        user_answer: userSelectedText
      });
    }

    const btn = document.getElementById('btn-next');
    btn.textContent = currentIndex === currentQuestions.length - 1 ? "Vedi Risultati" : "Prossima Domanda";
    btn.onclick = () => {
      currentIndex++;
      showQuestion();
    };
  }

  function endQuiz() {
    document.getElementById('quiz-screen').classList.add('hidden');
    document.getElementById('results-screen').classList.remove('hidden');
    document.getElementById('final-score').textContent = `Hai ottenuto ${score} punti su ${currentQuestions.length}.`;
    
    const reviewContainer = document.getElementById('review-container');
    if (wrongAnswersReview.length > 0) {
      let reviewHtml = `<h3 style="color: var(--text-main); margin-bottom: 15px;">Da ripassare (${wrongAnswersReview.length} errori):</h3>`;
      wrongAnswersReview.forEach(item => {
        reviewHtml += `<div class="review-item">
                        <strong>Errore</strong>
                        <div class="review-question">${escapeHtml(item.question)}</div>
                        <span style="color: var(--error-text); font-weight: 600; background: var(--error-bg); padding: 10px 14px; border-radius: 8px; display: block; font-size: 1rem; border: 1px solid var(--error-border); margin-bottom: 8px;">✗ Tua risposta: ${escapeHtml(item.user_answer)}</span>
                        <span class="review-correct">✓ Corretta: ${escapeHtml(item.correct_answer)}</span>
                       </div>`;
      });
      reviewContainer.innerHTML = reviewHtml;
    } else {
      reviewContainer.innerHTML = `<h3 style="color: #10B981; text-align: center;">Bravissimo! Percorso netto.</h3>`;
    }
  }

  document.getElementById('btn-restart').addEventListener('click', () => {
    document.getElementById('results-screen').classList.add('hidden');
    document.getElementById('start-screen').classList.remove('hidden');
    initApp();
  });

  window.addEventListener('error', function(e) {
    const statusEl = document.getElementById('db-status');
    if(statusEl) statusEl.textContent = 'Errore su iPad: ' + e.message;
  });

  document.addEventListener('DOMContentLoaded', initApp);
</script>
</body>
</html>
